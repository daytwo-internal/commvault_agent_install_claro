---
- name: Validar si ya existe la instancia HDPS/Commvault
  ansible.builtin.stat:
    path: "/etc/CommVaultRegistry/Galaxy/{{ hdps_focus }}"
  register: hdps_instance_dir

- name: Validar si existe directorio de instalación
  ansible.builtin.stat:
    path: "{{ hdps_install_directory }}"
  register: hdps_install_dir

- name: Definir si el agente ya está instalado
  ansible.builtin.set_fact:
    hdps_agent_installed: "{{ hdps_instance_dir.stat.exists and hdps_install_dir.stat.exists }}"

- name: Mostrar estado inicial
  ansible.builtin.debug:
    msg:
      - "Instance: {{ hdps_focus }}"
      - "Install dir exists: {{ hdps_install_dir.stat.exists }}"
      - "Instance dir exists: {{ hdps_instance_dir.stat.exists }}"
      - "Agent installed: {{ hdps_agent_installed }}"
      - "Register enabled in XML: {{ hdps_register_enabled }}"

- name: Instalar y registrar HDPS/Commvault con silent_install
  when:
    - not hdps_agent_installed | bool or hdps_force_install | default(false) | bool
  block:

    - name: Validar que hdps_local_installer_dir esté definido
      ansible.builtin.assert:
        that:
          - hdps_local_installer_dir | length > 0
        fail_msg: "Debe definirse hdps_local_installer_dir."

    - name: Validar que la ruta remota no tenga espacios
      ansible.builtin.assert:
        that:
          - "' ' not in hdps_remote_installer_dir"
        fail_msg: "La ruta remota del instalador no debe tener espacios."

    - name: Validar método de autenticación
      ansible.builtin.assert:
        that:
          - hdps_auth_method in ["authcode", "user_password"]
        fail_msg: "hdps_auth_method debe ser authcode o user_password."

    - name: Validar datos para registro con authcode
      ansible.builtin.assert:
        that:
          - hdps_commserve_hostname | length > 0
          - hdps_authcode | length > 0
        fail_msg: "Para instalar y registrar con authcode se requiere hdps_commserve_hostname y hdps_authcode."
      when:
        - hdps_register_enabled | bool
        - hdps_auth_method == "authcode"

    - name: Validar datos para registro con usuario/password
      ansible.builtin.assert:
        that:
          - hdps_commserve_hostname | length > 0
          - hdps_commcell_user | length > 0
          - hdps_commcell_password | length > 0
        fail_msg: "Para instalar y registrar con usuario/password se requiere CommServe, usuario y password."
      when:
        - hdps_register_enabled | bool
        - hdps_auth_method == "user_password"

    - name: Crear directorio remoto del instalador
      ansible.builtin.file:
        path: "{{ hdps_remote_installer_dir }}"
        state: directory
        mode: "0755"

#    - name: Copiar instalador HDPS/Commvault al host
#      ansible.builtin.copy:
#        src: "{{ hdps_local_installer_dir }}/"
#        dest: "{{ hdps_remote_installer_dir }}/"
#        mode: preserve

    - name: Copiar instalador comprimido HDPS/Commvault al host
      ansible.builtin.copy:
        src: "{{ hdps_installer_archive }}"
        dest: "{{ hdps_remote_installer_archive }}"
        mode: "0644"

    - name: Descomprimir instalador HDPS/Commvault en el host
      ansible.builtin.unarchive:
        src: "{{ hdps_remote_installer_archive }}"
        dest: "{{ hdps_remote_installer_dir }}"
        remote_src: true


    - name: Validar silent_install
      ansible.builtin.stat:
        path: "{{ hdps_remote_installer_dir }}/Unix/silent_install"
      register: hdps_silent_install

    - name: Fallar si no existe silent_install
      ansible.builtin.assert:
        that:
          - hdps_silent_install.stat.exists
        fail_msg: "No se encontró silent_install en {{ hdps_remote_installer_dir }}."

    - name: Generar default.xml con authcode
      ansible.builtin.template:
        src: default_authcode.xml.j2
        dest: "{{ hdps_remote_installer_dir }}/Unix/default.xml"
        mode: "0600"
      no_log: true
      when: hdps_auth_method == "authcode"

    - name: Generar default.xml con usuario/password
      ansible.builtin.template:
        src: default_user_password.xml.j2
        dest: "{{ hdps_remote_installer_dir }}/Unix/default.xml"
        mode: "0600"
      no_log: true
      when: hdps_auth_method == "user_password"

    - name: Ejecutar silent_install para instalar y registrar
      ansible.builtin.command:
        cmd: "./silent_install -p default.xml"
        chdir: "{{ hdps_remote_installer_dir }}/Unix"
      register: hdps_install_result
      changed_when: "'Installation completed' in hdps_install_result.stdout"

    - name: Mostrar salida de instalación
      ansible.builtin.debug:
        var: hdps_install_result.stdout_lines
      when:
        - hdps_install_result.stdout_lines is defined

- name: Omitir silent_install si el agente ya existe
  ansible.builtin.debug:
    msg: "El agente ya está instalado. Se omite silent_install."
  when:
    - hdps_agent_installed | bool
    - not hdps_force_install | default(false) | bool

- name: Validación final
  block:

    - name: Validar directorio de instalación
      ansible.builtin.stat:
        path: "{{ hdps_install_directory }}"
      register: hdps_final_install_dir

    - name: Validar instancia local
      ansible.builtin.stat:
        path: "/etc/CommVaultRegistry/Galaxy/{{ hdps_focus }}"
      register: hdps_final_instance_dir

    - name: Validar procesos principales
      ansible.builtin.shell: |
        ps -ef | grep -Ei "cvd|cvlaunchd|ClMgrS|cvfwd" | grep -v grep
      register: hdps_processes
      changed_when: false
      failed_when: false

    - name: Validar CommServe en registry
      ansible.builtin.command:
        cmd: "grep '^sCSHOSTNAME ' /etc/CommVaultRegistry/Galaxy/{{ hdps_focus }}/CommServe/.properties"
      register: hdps_final_commserve
      changed_when: false
      failed_when: false

    - name: Mostrar resultado final
      ansible.builtin.debug:
        msg:
          - "Install dir exists: {{ hdps_final_install_dir.stat.exists }}"
          - "Instance exists: {{ hdps_final_instance_dir.stat.exists }}"
          - "CommServe: {{ hdps_final_commserve.stdout | default('No configurado') }}"
          - "Processes:"
          - "{{ hdps_processes.stdout_lines }}"